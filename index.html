<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Redirect - URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .subtitle { color: #666; margin-bottom: 30px; text-align: center; }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .short-url { display: flex; gap: 10px; }
        .short-url input { flex: 1; margin-bottom: 0; font-family: monospace; }
        .copy-btn { width: auto; padding: 12px 20px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
        .stat-value { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 12px; color: #666; }
        .links-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
        }
        .link-url { font-family: monospace; font-size: 12px; color: #667eea; text-decoration: none; word-break: break-all; flex: 1; }
        .link-clicks { font-size: 12px; color: #666; margin-left: 10px; }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .api-info { margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 10px; font-size: 12px; font-family: monospace; }
        @media (max-width: 600px) { .container { padding: 20px; } .short-url { flex-direction: column; } .copy-btn { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Security Redirect</h1>
        <div class="subtitle">Instant 301 Redirects - Powered by Cloudflare</div>
        <div id="alert" class="alert"></div>
        <textarea id="longUrl" rows="2" placeholder="https://example.com/very/long/url/that/needs/shortening..."></textarea>
        <input type="text" id="customAlias" placeholder="Custom alias (optional)">
        <button onclick="createShortLink()">✨ Create Short Link</button>
        <div id="result" class="result">
            <div class="short-url">
                <input type="text" id="shortUrl" readonly>
                <button class="copy-btn" onclick="copyToClipboard()">📋 Copy</button>
            </div>
            <div id="shortLinkInfo"></div>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="totalLinks">0</div><div class="stat-label">Total Links</div></div>
            <div class="stat"><div class="stat-value" id="totalClicks">0</div><div class="stat-label">Total Clicks</div></div>
        </div>
        <div id="linksList" class="links-list"></div>
        <div class="api-info">
            <strong>📡 API Endpoints:</strong><br>
            GET /shorten?url=URL - Create short link<br>
            GET /shorten?url=URL&alias=NAME - With custom alias<br>
            GET /stats - Get statistics<br>
            GET /{alias} - Instant redirect
        </div>
    </div>
    <script>
        // CHANGE THIS TO YOUR CLOUDFLARE WORKER URL FROM STEP 3
        const API_URL = 'https://git-sec.workers.dev';
        
        async function loadStats() {
            try {
                const res = await fetch(API_URL + '/stats');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('totalLinks').textContent = data.total_links;
                    document.getElementById('totalClicks').textContent = data.total_clicks;
                    renderLinksList(data.links);
                }
            } catch(e) { console.error(e); }
        }
        
        function renderLinksList(linksData) {
            const container = document.getElementById('linksList');
            if (!linksData || linksData.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">No links yet. Create your first short link!</div>';
                return;
            }
            container.innerHTML = linksData.slice(0, 10).map(link => `
                <div class="link-item">
                    <a href="${API_URL}/${link.alias}" class="link-url" target="_blank">/${link.alias}</a>
                    <span class="link-clicks">${link.clicks} clicks</span>
                </div>
            `).join('');
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
        
        function copyToClipboard() {
            const input = document.getElementById('shortUrl');
            input.select();
            document.execCommand('copy');
            showAlert('Copied to clipboard!', 'success');
        }
        
        async function createShortLink() {
            const longUrl = document.getElementById('longUrl').value.trim();
            const customAlias = document.getElementById('customAlias').value.trim();
            if (!longUrl) { showAlert('Please enter a URL', 'error'); return; }
            
            let url = API_URL + '/shorten?url=' + encodeURIComponent(longUrl);
            if (customAlias) url += '&alias=' + encodeURIComponent(customAlias);
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('shortUrl').value = data.short_url;
                    document.getElementById('shortLinkInfo').innerHTML = `🎉 Link created!<br>📍 Redirects to: ${data.original_url.substring(0, 60)}${data.original_url.length > 60 ? '...' : ''}`;
                    document.getElementById('result').classList.add('show');
                    document.getElementById('longUrl').value = '';
                    document.getElementById('customAlias').value = '';
                    loadStats();
                    showAlert('Short link created!', 'success');
                } else {
                    showAlert(data.error || 'Failed to create link', 'error');
                }
            } catch(e) { showAlert('Error: ' + e.message, 'error'); }
        }
        
        loadStats();
        setInterval(loadStats, 30000);
        document.getElementById('longUrl').addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) createShortLink(); });
    </script>
</body>
</html>
